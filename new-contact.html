<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/contact.png">
</head>
<body id="body_new">
    <div  class="nav_bar">
        <nav>
            <a href="index.html">Home</a>
            <a href="new-contact.html">New Contact</a>
            <a href="view-contacts.html">View All Contacts</a>
        </nav>
    </div>
    <div class="form">
    <form>
        <h2>Add New Contact</h2>
        <hr>
        <div id="iD">
        <label for="Id">ID Number</label>
        <input id="Id" type="number" name="id_number" placeholder="Enter Identification Number">
        </div>

        <div id="fm">
        <label for="firstname">Firstname</label>
        <input id="firstname" type="text" name="firstname" placeholder="Enter First Name">
        </div>

        <div id="lm">
        <label for="lastname">Lastname</label>
        <input id="lastname" type="text" name="lastname" placeholder="Enter Last Name">
        </div>

        <div id="gen">
        <label for="Gender">Gender</label>    
            <label for="male">Male:</label>
            <input id="male" name="gender" type="radio" value="male">
            <label for="female">Female:</label>
            <input id="female" name="gender" type="radio" value="female">
        </div>

        <div id="div_phone">
        <label for="phone">Phone</label>
        <input id="phone" type="tel" name="phone" placeholder="+2547------">
        </div>

        <div id="div_email">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" placeholder="Enter Email">
        </div>

        <div id="div_address">
        <label for="address">Address</label>
        <input id="address" type="text" name="address" placeholder="Enter Address">
        </div>

        <div id="dob">
        <label for="DOB">Date of Birth</label>
        <input id="DOB" type="date" name="DOB">
        </div>

        <div id="poS">
        <label for="pos">Position</label>
        <select id="pos" name="position">
            <option>Manager</option>
            <option>Assistant Manager</option>
            <option>Human Resource</option>
            <option>Supervisor</option>
            <option>Worker</option>
        </select>
        </div>

        <div id="dep">
        <label for="department">Department</label>
        <input id="department" type="text" name="department" placeholder="Enter Department">
        </div>

        <div id="submit">
        <button type="button" onclick="submitAlert()">Submit</button>
        </div>
    </form>
    </div>   
    <script src="main.js"></script>
</body>
</html>
